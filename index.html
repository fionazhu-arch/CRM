<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>CRM系统</h1>
            <nav>
                <ul>
                    <li><a href="#" class="nav-link" data-section="leads">新线索</a></li>
                    <li><a href="#" class="nav-link" data-section="after-sales">售后</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section id="leads" class="section">
                <h2>新线索管理</h2>
                <div class="section-content">
                    <div class="form-container">
                        <h3>添加新线索</h3>
                        <form id="lead-form">
                            <div class="form-group">
                                <label for="lead-name">姓名</label>
                                <input type="text" id="lead-name" required>
                            </div>
                            <div class="form-group">
                                <label for="lead-phone">电话</label>
                                <input type="tel" id="lead-phone" required>
                            </div>
                            <div class="form-group">
                                <label for="lead-email">邮箱</label>
                                <input type="email" id="lead-email">
                            </div>
                            <div class="form-group">
                                <label for="lead-source">来源</label>
                                <select id="lead-source">
                                    <option value="website">网站</option>
                                    <option value="phone">电话</option>
                                    <option value="referral">推荐</option>
                                    <option value="other">其他</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="lead-status">状态</label>
                                <select id="lead-status">
                                    <option value="new">新线索</option>
                                    <option value="contacted">已联系</option>
                                    <option value="qualified">已 qualify</option>
                                    <option value="closed">已关闭</option>
                                </select>
                            </div>
                            <button type="submit" class="btn">保存线索</button>
                        </form>
                    </div>
                    <div class="list-container">
                        <h3>线索列表</h3>
                        <table id="leads-table">
                            <thead>
                                <tr>
                                    <th>姓名</th>
                                    <th>电话</th>
                                    <th>邮箱</th>
                                    <th>来源</th>
                                    <th>状态</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 线索数据将通过JavaScript动态添加 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
            <section id="after-sales" class="section" style="display: none;">
                <h2>售后管理</h2>
                <div class="section-content">
                    <div class="form-container">
                        <h3>创建售后工单</h3>
                        <form id="ticket-form">
                            <div class="form-group">
                                <label for="ticket-customer">客户姓名</label>
                                <input type="text" id="ticket-customer" required>
                            </div>
                            <div class="form-group">
                                <label for="ticket-contact">联系方式</label>
                                <input type="text" id="ticket-contact" required>
                            </div>
                            <div class="form-group">
                                <label for="ticket-type">工单类型</label>
                                <select id="ticket-type">
                                    <option value="complaint">投诉</option>
                                    <option value="question">咨询</option>
                                    <option value="service">服务请求</option>
                                    <option value="other">其他</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="ticket-description">问题描述</label>
                                <textarea id="ticket-description" rows="4" required></textarea>
                            </div>
                            <div class="form-group">
                                <label for="ticket-priority">优先级</label>
                                <select id="ticket-priority">
                                    <option value="low">低</option>
                                    <option value="medium">中</option>
                                    <option value="high">高</option>
                                </select>
                            </div>
                            <button type="submit" class="btn">创建工单</button>
                        </form>
                    </div>
                    <div class="list-container">
                        <h3>售后工单列表</h3>
                        <table id="tickets-table">
                            <thead>
                                <tr>
                                    <th>工单编号</th>
                                    <th>客户姓名</th>
                                    <th>联系方式</th>
                                    <th>工单类型</th>
                                    <th>优先级</th>
                                    <th>状态</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 工单数据将通过JavaScript动态添加 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 CRM系统</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
